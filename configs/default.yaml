# SEA-QAL configuration
# Default configuration for Semantic-Energy Coupled Quantum-Inspired Adaptive Learning

experiment:
  name: SEA-QAL
  framework: semantic_energy_coupled_QUBO
  seed: 42
  deterministic: true
  precision: float32


# Hardware and software environment
hardware:
  gpu: NVIDIA_RTX_4090
  gpu_memory: 24GB
  cpu_memory: 64GB

software:
  python: 3.10
  pytorch: 2.x
  cuda: 12.1
  os: Ubuntu_22.04


# Cloud-edge system configuration
cloud_edge:
  edge_nodes:
    min_nodes: 5
    max_nodes: 20

  cpu_frequency:
    min: 1.2
    max: 2.4
    unit: GHz

  memory:
    min: 4
    max: 16
    unit: GB

  communication:
    bandwidth_model: stochastic
    latency_model: time_correlated
    channel_variability: enabled


# Federated learning configuration
federated_learning:
  rounds: 100
  local_epochs: 5
  aggregation: weighted_federated_averaging

  client_selection:
    semantic_aware: true
    energy_aware: true
    adaptive_feedback: true


# Semantic contribution module
semantic_module:

  indicators:
    gradient_sensitivity: true
    prediction_uncertainty: true
    attention_concentration: true

  normalization:
    method: min_max
    range:
      min: 0
      max: 1

  weights:
    gradient:
      value: 0.3333

    uncertainty:
      value: 0.3333

    attention:
      value: 0.3333


# Multi-objective optimization weights
optimization:

  objective:
    alpha: 0.33     # learning loss weight
    beta: 0.33      # energy consumption weight
    gamma: 0.34     # semantic reward weight

  adaptive_weights:
    enabled: true
    feedback_control: true


# QUBO formulation
qubo:

  formulation:
    enabled: true

  diagonal_terms:
    loss_weight: alpha
    energy_weight: beta
    semantic_weight: gamma


  interaction_terms:

    semantic_redundancy:
      lambda: 0.3333

    communication_coupling:
      lambda: 0.3333

    resource_contention:
      lambda: 0.3333


  normalization:
    enabled: true
    range:
      min: 0
      max: 1


# Quantum-inspired annealing solver

solver:

  type: quantum_inspired_annealing

  iterations: 100

  initial_temperature: 1.0

  cooling_rate: 0.95

  tunneling_coefficient:
    enabled: true
    decay_factor: 0.01


# Convergence control

convergence:

  tolerance: 0.0001

  consecutive_iterations: 10

  objective_monitor:
    metric: normalized_QUBO_energy


# Evaluation metrics

evaluation:

  metrics:
    - accuracy
    - energy_consumption
    - latency
    - sustainability_index

  confidence_interval:
    enabled: true
    confidence_level: 0.95

  statistical_test:
    method: wilcoxon_signed_rank

  effect_size:
    method: cliffs_delta


# Sustainability Index

sustainability_index:

  weights:

    accuracy:
      value: 0.3333

    energy_efficiency:
      value: 0.3333

    latency_efficiency:
      value: 0.3333
